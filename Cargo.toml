[package]
name = "pivot-os"
edition = "2021"

[dependencies]
limine = "0.3.0"
log = "0.4.22"
x86_64 = { version = "0.15.1", default-features = false, features = ["instructions"] }
pivot-mem = { path = "mem" }
pivot-drivers = { path = "drivers" }

[workspace]
members = ["mem", "drivers"]

[build-dependencies]
regex = "1.10.6"
